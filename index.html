<!DOCTYPE html>
<html>
<head>
<title>Abdii Bingo</title>

<style>
body{
  text-align:center;
  font-family:Arial;
  background:#f2f2f2;
}

h1{
  color:green;
}

table{
  margin:auto;
  border-collapse:collapse;
}

th,td{
  border:2px solid black;
  width:60px;
  height:60px;
  font-size:25px;
  background:white;
}

th{
  background:green;
  color:white;
}

.mark{
  background:yellow;
}

button{
  padding:15px 30px;
  font-size:18px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🎱 Abdii Bingo</h1>

<table id="bingo">
<tr>
<th>B</th><th>I</th><th>N</th><th>G</th><th>O</th>
</tr>

<tr><td>1</td><td>16</td><td>31</td><td>46</td><td>61</td></tr>
<tr><td>5</td><td>20</td><td>35</td><td>50</td><td>65</td></tr>
<tr><td>10</td><td>25</td><td>FREE</td><td>55</td><td>70</td></tr>
<tr><td>12</td><td>28</td><td>42</td><td>58</td><td>73</td></tr>
<tr><td>15</td><td>30</td><td>45</td><td>60</td><td>75</td></tr>

</table>

<button onclick="start()">Start Bingo</button>

<h2 id="number">Lakkoofsa: -</h2>

<script>
function start(){
 let n = Math.floor(Math.random()*75)+1;
 document.getElementById("number").innerHTML="Lakkoofsa: "+n;

 let cells=document.querySelectorAll("#bingo td");

 cells.forEach(cell=>{
   if(cell.innerHTML==n){
     cell.classList.add("mark");
   }
 });
}
</script>

</body>
</html>
