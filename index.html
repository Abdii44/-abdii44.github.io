<!DOCTYPE html>
<html>
<head>
<title>Abdii Bingo</title>

<style>
body{
 text-align:center;
 font-family:Arial;
 background:#f2f2f2;
}

h1{
 color:green;
}

input{
 padding:10px;
 font-size:18px;
}

button{
 padding:12px 25px;
 font-size:18px;
 margin:10px;
}

table{
 margin:auto;
 border-collapse:collapse;
}

th,td{
 border:2px solid black;
 width:60px;
 height:60px;
 font-size:22px;
 background:white;
}

th{
 background:green;
 color:white;
}

.mark{
 background:yellow;
}

#win{
 color:green;
 font-size:30px;
}
</style>

</head>

<body>

<h1>🎱 Abdii Bingo</h1>

<input id="player" placeholder="Maqaa Player">
<button onclick="setPlayer()">Galchi</button>

<h2 id="name"></h2>

<table id="board">
<tr>
<th>B</th>
<th>I</th>
<th>N</th>
<th>G</th>
<th>O</th>
</tr>
</table>

<button onclick="start()">Start Bingo</button>
<button onclick="newGame()">New Game</button>

<h2 id="number">Lakkoofsa: -</h2>

<h2 id="win"></h2>


<script>

let called=[];
let count=0;
let columns=[];

function randomNumbers(min,max){

let arr=[];

while(arr.length<5){

let n=Math.floor(Math.random()*(max-min+1))+min;

if(!arr.includes(n)){
arr.push(n);
}

}

return arr;

}


function createBoard(){

columns=[
randomNumbers(1,15),
randomNumbers(16,30),
randomNumbers(31,45),
randomNumbers(46,60),
randomNumbers(61,75)
];


let board=document.getElementById("board");


for(let r=0;r<5;r++){

let row=board.insertRow();

for(let c=0;c<5;c++){

let cell=row.insertCell();


if(r==2 && c==2){

cell.innerHTML="FREE";
cell.classList.add("mark");

}else{

cell.innerHTML=columns[c][r];

}

}

}

}


createBoard();
 function start(){

if(called.length>=75){
alert("Lakkoofsi hundi ba'eera!");
return;
}

let n;

do{
 n=Math.floor(Math.random()*75)+1;
}
while(called.includes(n));


called.push(n);
count++;


document.getElementById("number").innerHTML=
"Lakkoofsa: "+n;


document.getElementById("count").innerHTML=
"Lakkoofsa ba'e: "+count;


let cells=document.querySelectorAll("#board td");

cells.forEach(cell=>{

if(cell.innerHTML==n){

cell.classList.add("mark");

}

});

}
</script>

</body>
</html>
