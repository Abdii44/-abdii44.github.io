<!DOCTYPE html>
<html>
<head>
<title>Abdii Bingo</title>

<style>
body{
 text-align:center;
 font-family:Arial;
 background:#f2f2f2;
}

h1{
 color:green;
}

table{
 margin:auto;
 border-collapse:collapse;
}

th,td{
 border:2px solid black;
 width:60px;
 height:60px;
 font-size:22px;
 background:white;
}

th{
 background:green;
 color:white;
}

.mark{
 background:yellow;
}

button{
 padding:15px 30px;
 font-size:18px;
 margin:20px;
}
</style>
</head>

<body>

<h1>🎱 Abdii Bingo</h1>

<table id="board">
<tr>
<th>B</th><th>I</th><th>N</th><th>G</th><th>O</th>
</tr>
</table>

<button onclick="start()">Start Bingo</button>

<h2 id="number">Lakkoofsa: -</h2>

<script>

let called=[];

let columns=[
[1,2,3,4,5],
[16,17,18,19,20],
[31,32,33,34,35],
[46,47,48,49,50],
[61,62,63,64,65]
];

let board=document.getElementById("board");

for(let r=0;r<5;r++){
 let row=board.insertRow();
 for(let c=0;c<5;c++){
  let cell=row.insertCell();
  cell.innerHTML=columns[c][r];
 }
}

function start(){

let n;

do{
 n=Math.floor(Math.random()*75)+1;
}while(called.includes(n));

called.push(n);

document.getElementById("number").innerHTML=
"Lakkoofsa: "+n;

let cells=document.querySelectorAll("#board td");

cells.forEach(cell=>{
 if(cell.innerHTML==n){
  cell.classList.add("mark");
 }
});

}

</script>

</body>
</html>
