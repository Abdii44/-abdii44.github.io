<!DOCTYPE html>
<html>
<head>
<title>Abdii Bingo</title>
<style>
body{
 text-align:center;
 font-family:Arial;
 background:#f2f2f2;
}
h1{color:green;}
table{
 margin:auto;
 border-collapse:collapse;
}
th,td{
 border:2px solid black;
 width:60px;
 height:60px;
 font-size:22px;
 background:white;
}
th{
 background:green;
 color:white;
}
.mark{
 background:yellow;
}
button{
 padding:15px 30px;
 font-size:18px;
 margin:20px;
}
</style>
</head>

<body>

<h1>🎱 Abdii Bingo</h1>

<table id="board">
<tr>
<th>B</th><th>I</th><th>N</th><th>G</th><th>O</th>
</tr>
</table>

<button onclick="start()">Start Bingo</button>

<h2 id="number">Lakkoofsa: -</h2>

<script>
let numbers=[];
for(let i=1;i<=75;i++){
 numbers.push(i);
}

let board=document.getElementById("board");

for(let r=0;r<5;r++){
 let row=board.insertRow();
 for(let c=0;c<5;c++){
  let cell=row.insertCell();
  let n=numbers[r*5+c];
  if(r==2 && c==2){
   cell.innerHTML="FREE";
  }else{
   cell.innerHTML=n;
  }
 }
}

function start(){
 if(numbers.length==0){
  document.getElementById("number").innerHTML="BINGO!";
  return;
 }

 let index=Math.floor(Math.random()*numbers.length);
 let n=numbers[index];
 numbers.splice(index,1);

 document.getElementById("number").innerHTML="Lakkoofsa: "+n;

 let cells=document.querySelectorAll("#board td");
 cells.forEach(cell=>{
  if(cell.innerHTML==n){
   cell.classList.add("mark");
  }
 });
}
</script>

</body>
</html>
