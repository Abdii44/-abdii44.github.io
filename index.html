<!DOCTYPE html>
<html>
<head>
<title>Abdii Bingo</title>

<style>
body{
 text-align:center;
 font-family:Arial;
 background:#f2f2f2;
}

h1{color:green;}

input{
 padding:10px;
 font-size:18px;
}

table{
 margin:auto;
 border-collapse:collapse;
}

th,td{
 border:2px solid black;
 width:60px;
 height:60px;
 font-size:22px;
 background:white;
}

th{
 background:green;
 color:white;
}

.mark{
 background:yellow;
}

button{
 padding:12px 25px;
 font-size:18px;
 margin:10px;
}

</style>
</head>

<body>

<h1>🎱 Abdii Bingo</h1>

<input id="player" placeholder="Maqaa Player">
<h2 id="name"></h2>

<table id="board">
<tr>
<th>B</th><th>I</th><th>N</th><th>G</th><th>O</th>
</tr>
</table>

<button onclick="start()">Start Bingo</button>
<button onclick="newGame()">New Game</button>

<h2 id="number">Lakkoofsa: -</h2>
<h2 id="win"></h2>

<script>

let called=[];
let numbers=[
[1,2,3,4,5],
[16,17,18,19,20],
[31,32,33,34,35],
[46,47,48,49,50],
[61,62,63,64,65]
];

let board=document.getElementById("board");

function createBoard(){

for(let r=0;r<5;r++){
 let row=board.insertRow();

 for(let c=0;c<5;c++){
  let cell=row.insertCell();
  cell.innerHTML=numbers[c][r];
 }
}

}

createBoard();


function start(){

let n;

do{
 n=Math.floor(Math.random()*75)+1;
}while(called.includes(n));

called.push(n);

document.getElementById("number").innerHTML=
"Lakkoofsa: "+n;

document.querySelectorAll("#board td").forEach(cell=>{
 if(cell.innerHTML==n){
  cell.classList.add("mark");
 }
});

}


function newGame(){

location.reload();

}

</script>

</body>
</html>
