<!DOCTYPE html>
<html>
<head>
  <title>Abdii Bingo</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f2f2f2;
    }
    h1 {
      color: green;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
    }
    #number {
      font-size: 50px;
      margin: 30px;
    }
  </style>
</head>

<body>

<h1>Abdii Bingo</h1>

<div id="number">0</div>

<button onclick="play()">Start Bingo</button>

<script>
function play(){
  let n = Math.floor(Math.random() * 75) + 1;
  document.getElementById("number").innerHTML = n;
}
</script>

</body>
</html>
